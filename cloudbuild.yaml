substitutions:
  _REPO_URL: https://github.com/ndthanh143/cicd-gke.git
  _IMAGE_NAME: gke-image
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_PROJECT_ID: static-scholar-499213-k5
  _AR_REPOSITORY: gke-image-repo
  _IMAGE_TAG: V2.0
  _DEPLOYMENT_FILE: k8s/deployment.yaml

steps:
  - id: clone-repo
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    args:
      - -c
      - |
        rm -rf repo
        git clone "${_REPO_URL}" repo

  - id: build-image
    name: gcr.io/cloud-builders/docker
    dir: repo
    args:
      - build
      - -t
      - ${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}

#us-central1-docker.pkg.dev/static-scholar-499213-k5/gke-image-repo/gke-image@sha256:29729501faa286619a18f27048ce75b5e13c311ac606917ff238a795e818e9b7
  - id: deploy-to-gke
    name: gcr.io/cloud-builders/kubectl
    args:
      - set
      - image
      - deployment/cicd-app-1
      - nginx-1=${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=asia-southeast1-b'
      - 'CLOUDSDK_CONTAINER_CLUSTER=cicd-cluster'
options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}

